# Target: dev-frontend
# Merges: base.common → env.dev → component.frontend (right wins on scalar conflicts)
classes:
  - env.dev
  - component.frontend

parameters:
  kapitan:
    vars:
      target: dev-frontend
    compile:
      - input_paths:
          - templates/manifests.yml
        input_type: jinja2
        output_path: .
        output_type: yaml
